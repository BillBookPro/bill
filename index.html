       ============================================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ⬇️ APNA FIREBASE CONFIG YAHAN PASTE KAREIN
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBy8UEKBowJP1Vp4QHO4asjPxmgq_UfODM",
  authDomain: "bill-book-pro-93155.firebaseapp.com",
  projectId: "bill-book-pro-93155",
  storageBucket: "bill-book-pro-93155.firebasestorage.app",
  messagingSenderId: "409759386921",
  appId: "1:409759386921:web:886bb07870ab756ba67b38",
  measurementId: "G-XFRTME6Z4R"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Global references taaki baaki JS use kar sake
    window._fbAuth = auth;
    window._fbDb = db;
    window._fbFns = {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      signOut,
      doc,
      setDoc,
      getDoc,
      onSnapshot
    };

    // Auth state listener — login/logout pe app update karo
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user.uid;
        window._fbCurrentEmail = user.email;
        // Firestore se data load karo
        await window._fbLoadStore();
        invoiceCounters = loadInvoiceCounters();
        document.body.classList.remove('auth-locked');
        document.getElementById('current-user-label').textContent = user.email;
        updateProductList();
        renderDashboard();
      } else {
        currentUser = null;
        window._fbCurrentEmail = null;
        store = structuredClone(defaultStore);
        document.body.classList.add('auth-locked');
        setAuthMode('login');
      }
    });
  </script>
  <style>
